<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ვებსაიტი 1: სიები და დიალოგი</title>
</head>
<body>
    <header>
        <h1>ვებსაიტი 1: სიები და დიალოგი</h1>
    </header>

    <main>
        <section>
            <h2>1. განსაზღვრული სიები (`ordered lists`)</h2>
            <ol>
                <li>პირველი პუნქტი</li>
                <li>მეორე პუნქტი</li>
                <li>მესამე პუნქტი</li>
                <li>მეოთხე პუნქტი</li>
                <li>მეხუთე პუნქტი</li>
            </ol>
        </section>

        <section>
            <h2>2. უდადგენელი სიები (`unordered lists`)</h2>
            <ul>
                <li>პირველი პუნქტი</li>
                <li>მეორე პუნქტი</li>
                <li>მესამე პუნქტი</li>
                <li>მეოთხე პუნქტი</li>
                <li>მეხუთე პუნქტი</li>
            </ul>
        </section>


  
</body>
</html>
