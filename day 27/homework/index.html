 <!DOCTYPE html>
 <html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ფეისბუქის რეგისტრაცია</title>

<body>
  <div class="container">
    <div class="form-container">
      <h2>რეგისტრაცია</h2>
      <form action="#" method="POST">
       
        <div class="input-group">
          <label for="first-name">სახელი</label>
          <input type="text" id="first-name" name="first-name" placeholder="სახელი" required>
        </div>
        <div class="input-group">
          <label for="last-name">გვარი</label>
          <input type="text" id="last-name" name="last-name" placeholder="გვარი" required>
        </div>
        
        <!-- Email -->
        <div class="input-group">
          <label for="email">ელ. ფოსტა</label>
          <input type="email" id="email" name="email" placeholder="ელ. ფოსტა" required>
        </div>

          <label for="password">პაროლი</label>

          <label for="dob">დაბადების თარიღი</label>
          <input type="date" id="dob" name="dob" required>
        </div>
        
        <!-- Gender -->

          <label for="gender">სქესი</label>
          <select id="gender" name="gender">
            <option value="male">მამრობითი</option>
            <option value="female">მდედრობითი</option>
            <option value="other">სხვა</option>
          </select>
        </div>

          </label>
        </div>

        <!-- Register Button -->

      </form>
    </div>
  </div>
</body>
