<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>ღვინის გალერეა</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header>
        <h1>ღვინის გალერეა</h1>
    </header>

    <!-- ღვინის გალერეა -->
    <section class="gallery">
        <div class="gallery-item">
            <img src="wine1.jpg" alt="ღვინის სახეობა 1">
            <div class="desc">ღვინის სახეობა 1</div>
        </div>
        <div class="gallery-item">
            <img src="wine2.jpg" alt="ღვინის სახეობა 2">
            <div class="desc">ღვინის სახეობა 2</div>
        </div>
        <div class="gallery-item">
            <img src="wine3.jpg" alt="ღვინის სახეობა 3">
            <div class="desc">ღვინის სახეობა 3</div>
        </div>
    </section>

    <!-- სარეგისტრაციო ფორმა -->
    <section class="registration-form">
        <h2>რეგისტრაცია</h2>
        <form id="registerForm">
            <label for="name">სახელი:</label>
            <input type="text" id="name" name="name" required>
            
            <label for="email">ელ. ფოსტა:</label>
            <input type="email" id="email" name="email" required>
            
            <label for="password">პაროლი:</label>
            <input type="password" id="password" name="password" required>

            <label for="confirmPassword">დადასტურება პაროლისთვის:</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required>
            
            <label for="newsletter">
                <input type="checkbox" id="newsletter" name="newsletter"> გაიარეთ გამოწერა სიახლეებზე
            </label>

            <button type="submit">რეგისტრაცია</button>
        </form>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2025 ღვინის გალერეა</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
