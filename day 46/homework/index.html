<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>პარაგრაფები</title>
  <style>
    /* პირველი პარაგრაფი - ხაზი ქვეშ */
    p.underlined {
      text-decoration: underline;
      text-decoration-color: rgb(255, 0, 0); /* წითელი */
    }

    /* მეორე პარაგრაფი - გადახაზული ტექსტი */
    p.strikethrough {
      text-decoration: line-through;
      text-decoration-color: rgb(0, 0, 255); /* ლურჯი */
      text-decoration-style: dashed; /* ხაზის სტილი - dashed */
    }

    /* მესამე პარაგრაფი - ხაზი ზემოთ */
    p.above {
      text-decoration: overline;
      text-decoration-color: rgb(0, 255, 0); /* მწვანე */
      text-decoration-style: dotted; /* dotted სტილი */
    }
  </style>
</head>
<body>

  <p class="underlined">ეს არის პირველი პარაგრაფი, რომელიც ხაზგასმულია ქვეშ. ხაზის ფერი არის წითელი.</p>
  <p class="strikethrough">ეს არის მეორე პარაგრაფი, რომელიც გადახაზულია. ხაზის ფერი ლურჯია და სტილი dashed.</p>
  <p class="above">ეს არის მესამე პარაგრაფი, რომელშიც ხაზია ზემოთ. ხაზის ფერი მწვანეა და სტილი dotted.</p>

</body>
</html>
