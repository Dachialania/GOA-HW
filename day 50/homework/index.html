<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube ლინკი</title>
  <style>
    /* საერთო სტილი */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    /* ლინკის სტილი */
    a {
      text-decoration: none; /* ტექსტის ქვეშ ხაზი არ იქნება */
      color: black; /* საწყისი ფერი */
      font-size: 18px; /* საწყისი ზომა */
      padding: 10px 20px;
      border: 2px solid black; /* ლინკის გარშემო წვრილი შავი საზღვარი */
      border-radius: 5px; /* ოდნავ დამრგვალებული კუთხეები */
      transition: all 0.3s ease; /* შეცდომის ეფექტი ტრანზიციისთვის */
    }

    /* როდესაც ლინკზე დააჭერთ (active) */
    a:active {
      color: red; /* წითელი ფერი */
    }

    /* როდესაც მაუსი მიჰყავს ლინკს (hover) */
    a:hover {
      color: blue; /* ლურჯი ტექსტის ფერი */
      font-size: 22px; /* ტექსტის ზომის გაზრდა */
      background-color: red; /* წითელი ფონური ფერი */
    }
  </style>
</head>
<body>

  <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank">ჩაწერე ტექსტი: ჩემი საყვარელი მუსიკა!</a>

</body>
</html>
